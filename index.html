<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="only light" />
    <meta name="theme-color" content="#F8F3EA" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="XcrowHub" />
    <title>XcrowHub | Protected deals for crypto P2P</title>
    <meta name="description" content="Money stays locked in escrow until delivery is confirmed. Zero fees. Create a private deal or list on the marketplace. Built on Nimiq Pay." />
    <link rel="canonical" href="https://xcrowhub.com" />
    <meta property="og:site_name" content="XcrowHub" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xcrowhub.com" />
    <meta property="og:title" content="XcrowHub | Protected deals for crypto P2P" />
    <meta property="og:description" content="Money stays locked in escrow until delivery is confirmed. Zero fees. Private deals and marketplace listings with bidding." />
    <meta property="og:image" content="https://xcrowhub.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="XcrowHub protected crypto escrow" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XcrowHub | Protected deals for crypto P2P" />
    <meta name="twitter:description" content="Money stays locked in escrow until delivery is confirmed. Zero fees. Private deals and marketplace listings with bidding." />
    <meta name="twitter:image" content="https://xcrowhub.com/og-image.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://rsms.me/inter/inter.css" /></noscript>
  </head>
  <body>
    <!-- Inline splash: visible immediately, hidden once React mounts -->
    <div id="splash" style="position:fixed;inset:0;background:#F8F3EA;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity 0.3s;color-scheme:only light;">
      <img src="/logo-icon.png" alt="XcrowHub" style="width:72px;height:72px;border-radius:18px;background:#FFFDF8;box-shadow:0 1px 0 rgba(23,20,17,0.04),0 10px 28px -18px rgba(23,20,17,0.35);" />
      <div style="width:32px;height:3px;border-radius:99px;background:#E4D8C7;overflow:hidden;margin-top:4px;">
        <div style="height:100%;width:40%;background:#2F6F5E;border-radius:99px;animation:sl 1.2s ease-in-out infinite;"></div>
      </div>
    </div>
    <style>html,body{background:#F8F3EA;color-scheme:only light}#splash.done{opacity:0;pointer-events:none}@keyframes sl{0%{transform:translateX(-100%)}50%{transform:translateX(150%)}100%{transform:translateX(150%)}}</style>
    <script>window.__hideSplash=function(){var s=document.getElementById('splash');if(s){s.classList.add('done');setTimeout(function(){s.remove()},350);}}</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
