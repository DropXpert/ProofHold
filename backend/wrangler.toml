name = "proofhold-api"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 (SQLite) for deals, proofs, queries, decisions, timeline, txs ────
[[d1_databases]]
binding = "DB"
database_name = "proofhold"
# Fill in after `wrangler d1 create proofhold`:
database_id = "REPLACE_ME_AFTER_CREATE"
migrations_dir = "migrations"

# ── KV for short-lived data (auth nonces, idempotency keys, rate limits) ─
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_ME_AFTER_CREATE"

# ── Cron: on-chain watcher fires every minute ────────────────────────────
[triggers]
crons = ["* * * * *"]

# ── Public (non-secret) vars. Secrets set via `wrangler secret put` ──────
[vars]
NIMIQ_NETWORK = "main"
NIMIQ_RPC_URL = "https://rpc.nimiqcloud.com"
PROOFHOLD_CUSTODY_NIM_ADDR = "REPLACE_ME"
PROOFHOLD_ADMIN_NIM_ADDR = "REPLACE_ME"

EVM_CHAIN_ID = "137"
EVM_RPC_URL = "https://polygon-rpc.com"
USDT_CONTRACT_ADDR = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F"
USDT_DECIMALS = "6"
PROOFHOLD_CUSTODY_EVM_ADDR = "REPLACE_ME"

# CORS allow-list (comma-separated)
CORS_ORIGINS = "https://proof-hold.vercel.app,http://localhost:5173"

# Secrets (set via `wrangler secret put NAME`):
#   PROOFHOLD_NIM_SEED         24 recovery words of the custody wallet
#   PROOFHOLD_EVM_PRIVATE_KEY  0x-prefixed private key of the EVM custody wallet
#   AUTH_JWT_SECRET            random 32-byte hex for signing session JWTs
